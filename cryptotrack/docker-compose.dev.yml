version: '3.9'

# Uso: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up
services:
  backend:
    build:
      context: ./backend
    volumes:
      - ./backend/src:/app/src   # hot reload via nodemon
      - sqlite_data:/app/data
    environment:
      - NODE_ENV=development
    command: ["npx", "nodemon", "src/server.js"]

  frontend:
    build:
      context: ./frontend
    volumes:
      - ./frontend/src:/app/src
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:3001/api
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]
