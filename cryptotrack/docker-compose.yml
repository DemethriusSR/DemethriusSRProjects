version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cryptotrack-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - sqlite_data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_PATH=/app/data/cryptotrack.db
      - JWT_SECRET=${JWT_SECRET:-supersecretkey_change_in_prod}
      - COINGECKO_BASE_URL=https://api.coingecko.com/api/v3
      - PRICE_CACHE_TTL=60
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:3001/api
    container_name: cryptotrack-web
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  sqlite_data:
    driver: local
